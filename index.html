<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>poetsfeest in de klas</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #24304a;
        --muted: #5d7d92;
        --logo-blue: #009bd3;
        --logo-dark: #0086bd;
        --soft-blue: #eafaff;
        --water: #c9f3ff;
        --mint: #dff9f4;
        --green: #66c66a;
        --shadow: 0 10px 22px rgba(0, 126, 180, .10);
        font-family: "Trebuchet MS", "Arial Rounded MT Bold", system-ui, sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        height: 100vh;
        margin: 0;
        color: var(--ink);
        background:
          url("./background.png") center center / cover no-repeat,
          linear-gradient(135deg, #f6fdff 0%, #eafaff 55%, #f9ffff 100%);
        overflow: hidden;
      }

      body::before,
      body::after {
        display: none;
        content: "";
        position: fixed;
        inset: auto;
        width: 12rem;
        aspect-ratio: 1;
        border-radius: 50%;
        border: .55rem solid rgba(255, 255, 255, .72);
        box-shadow: inset 0 0 0 .35rem rgba(0, 155, 211, .10);
        pointer-events: none;
      }

      body::before { left: -4rem; top: 8rem; }
      body::after { right: -5rem; bottom: 4rem; }

      .doodles {
        display: none;
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .doodle {
        position: absolute;
        display: grid;
        place-items: center;
        color: rgba(0, 155, 211, .12);
        font-size: clamp(2rem, 4vw, 4.2rem);
        font-weight: 1000;
        transform: rotate(var(--turn));
      }

      .doodle.one { left: 3vw; top: 42vh; --turn: -14deg; }
      .doodle.two { right: 3vw; top: 35vh; --turn: 10deg; }
      .doodle.three { left: 36vw; bottom: 2vh; --turn: 7deg; }

      .app {
        position: relative;
        z-index: 1;
        width: min(1520px, calc(100vw - 18px));
        height: 100vh;
        margin: 0 auto;
        padding: 8px 0 10px;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 8px;
      }

      .topbar {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        padding: 0 4px;
      }

      .school-logo {
        width: clamp(48px, 5.4vw, 76px);
        aspect-ratio: 1;
        object-fit: cover;
        border-radius: 20px 15px 22px 15px;
        background: rgba(255,255,255,.8);
        box-shadow: 0 10px 18px rgba(0, 126, 180, .14);
        mix-blend-mode: multiply;
        opacity: .86;
      }

      .score {
        min-width: 0;
        padding: 0;
        background: transparent;
        box-shadow: none;
        border: 0;
      }

      .score-top {
        display: flex;
        justify-content: flex-start;
        gap: 10px;
        align-items: baseline;
        margin-bottom: 5px;
        font-weight: 900;
      }

      #scoreText {
        color: var(--logo-dark);
        font-size: clamp(1.12rem, 1.8vw, 1.7rem);
      }

      .meter {
        height: 15px;
        border-radius: 999px;
        background: rgba(255, 255, 255, .74);
        border: 2px solid rgba(255, 255, 255, .9);
        overflow: hidden;
        box-shadow: inset 0 1px 3px rgba(45, 56, 90, .08);
      }

      .meter-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #7fe1ef, var(--logo-blue), var(--logo-dark));
        transition: width .35s ease;
      }

      .toolbar {
        display: flex;
        gap: 8px;
      }

      .tool-button {
        width: clamp(46px, 5vw, 66px);
        aspect-ratio: 1;
        border: 3px solid rgba(255, 255, 255, .92);
        border-radius: 18px;
        color: white;
        background: linear-gradient(145deg, #16b9e4, #0089c6);
        box-shadow: 0 10px 18px rgba(0, 126, 180, .18);
        cursor: pointer;
        font: inherit;
        font-size: clamp(1.8rem, 3.4vw, 2.7rem);
        font-weight: 1000;
        line-height: 1;
      }

      .tool-button.edit {
        font-size: clamp(1.35rem, 2.6vw, 2rem);
        background: linear-gradient(145deg, #75d9eb, #009bd3);
      }

      .tool-button:focus-visible {
        outline: 4px solid rgba(0, 155, 211, .24);
        outline-offset: 3px;
      }

      .board {
        display: grid;
        grid-auto-flow: row;
        direction: ltr;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        grid-template-rows: repeat(5, minmax(0, 1fr));
        gap: 16px;
        min-height: 0;
      }

      .board.many {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px 12px;
      }

      .task {
        position: relative;
        min-height: 0;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 14px;
        align-items: center;
        padding: 14px 18px;
        border: 2px solid rgba(0, 155, 211, .14);
        border-radius: 28px;
        background:
          radial-gradient(circle at 91% 20%, rgba(0,155,211,.06) 0 12%, transparent 13%),
          linear-gradient(145deg, rgba(255,255,255,.97), rgba(255,255,255,.94));
        box-shadow: 0 8px 18px rgba(0, 126, 180, .08);
        cursor: pointer;
        user-select: none;
        overflow: hidden;
        transition: transform .18s ease, box-shadow .18s ease, filter .18s ease, opacity .18s ease;
      }

      .task::after {
        content: "";
        position: absolute;
        right: -18px;
        bottom: -18px;
        width: 88px;
        aspect-ratio: 1;
        border-radius: 50%;
        background: rgba(0, 155, 211, .05);
      }

      .task:hover,
      .task:focus-visible {
        outline: none;
        transform: translateY(-3px) rotate(-.4deg);
        box-shadow: 0 18px 30px rgba(45, 56, 90, .15);
      }

      .task:nth-child(4n+1) { --card-tint: #e9fbff; }
      .task:nth-child(4n+2) { --card-tint: #f3fdff; }
      .task:nth-child(4n+3) { --card-tint: #e8f7fb; }
      .task:nth-child(4n+4) { --card-tint: #f7feff; }

      .check {
        width: clamp(40px, 3.7vw, 56px);
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        border-radius: 18px;
        border: 3px solid rgba(0, 155, 211, .24);
        background: rgba(255, 255, 255, .9);
        color: transparent;
        box-shadow: inset 0 0 0 3px rgba(0, 155, 211, .06);
        font-size: clamp(1.55rem, 2.6vw, 2.35rem);
        font-weight: 1000;
        line-height: 1;
        z-index: 3;
        transition: all .2s ease;
      }

      .task-name {
        position: relative;
        z-index: 3;
        color: #173f56;
        font-size: clamp(1.05rem, 1.62vw, 1.84rem);
        line-height: 1.04;
        font-weight: 900;
        text-wrap: balance;
      }

      .board.many .task {
        padding: 9px 10px;
        gap: 9px;
        border-radius: 22px;
      }

      .board.many .check {
        width: clamp(30px, 2.6vw, 42px);
        border-radius: 14px;
      }

      .board.many .task-name {
        font-size: clamp(.72rem, .95vw, 1.12rem);
        line-height: 1.02;
      }

      .task.done {
        opacity: .48;
        filter: saturate(.88) brightness(1.02);
        border-color: rgba(102, 198, 106, .32);
        box-shadow: 0 4px 10px rgba(0, 126, 180, .04);
      }

      .task.done .check {
        color: #fff;
        border-color: #55b85a;
        background: var(--green);
        box-shadow: 0 8px 15px rgba(84, 173, 73, .28);
        transform: rotate(-6deg) scale(1.08);
      }

      .task.done .task-name {
        text-decoration: line-through;
        text-decoration-thickness: .12em;
        text-decoration-color: rgba(0, 155, 211, .46);
        opacity: .42;
      }

      .heart-pop {
        position: absolute;
        left: var(--x);
        top: var(--y);
        z-index: 5;
        color: #ff5d78;
        font-size: var(--size);
        line-height: 1;
        pointer-events: none;
        transform: translate(-50%, -50%) scale(.35) rotate(var(--turn));
        opacity: 0;
        filter: drop-shadow(0 4px 7px rgba(255, 93, 120, .18));
        animation: heart-pop 1.45s ease-out forwards;
      }

      @keyframes heart-pop {
        0% {
          opacity: 0;
          transform: translate(-50%, -10%) scale(.3) rotate(var(--turn));
        }
        18% {
          opacity: .95;
        }
        58% {
          opacity: .9;
          transform: translate(calc(-50% + var(--drift)), -88%) scale(1) rotate(calc(var(--turn) + 10deg));
        }
        100% {
          opacity: 0;
          transform: translate(calc(-50% + var(--drift)), -155%) scale(.75) rotate(calc(var(--turn) + 20deg));
        }
      }

      .add-panel {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        padding: 22px;
        background: rgba(230, 248, 253, .58);
        backdrop-filter: blur(5px);
        z-index: 30;
      }

      .add-panel.open {
        display: grid;
      }

      .edit-panel.open {
        display: grid;
      }

      .add-card {
        width: min(560px, calc(100vw - 36px));
        padding: 24px;
        border: 4px solid rgba(255, 255, 255, .95);
        border-radius: 30px;
        background: rgba(255, 255, 255, .96);
        box-shadow: 0 22px 50px rgba(0, 126, 180, .20);
      }

      .add-card label {
        display: block;
        margin-bottom: 12px;
        color: var(--logo-dark);
        font-size: clamp(1.35rem, 2.6vw, 2rem);
        font-weight: 1000;
      }

      .add-card input {
        width: 100%;
        border: 3px solid rgba(0, 155, 211, .25);
        border-radius: 20px;
        padding: 15px 16px;
        color: var(--ink);
        background: #f7fdff;
        font: inherit;
        font-size: clamp(1.1rem, 2vw, 1.45rem);
        font-weight: 800;
      }

      .add-card input:focus {
        outline: 4px solid rgba(0, 155, 211, .18);
      }

      .add-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 16px;
      }

      .add-actions button {
        border: 0;
        border-radius: 999px;
        padding: 11px 18px;
        cursor: pointer;
        font: inherit;
        font-weight: 1000;
      }

      .cancel-add {
        color: var(--logo-dark);
        background: #eafaff;
      }

      .save-add {
        color: white;
        background: linear-gradient(145deg, #16b9e4, #0089c6);
      }

      .edit-card {
        width: min(820px, calc(100vw - 36px));
        max-height: min(82vh, 760px);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
      }

      .edit-title {
        margin: 0 0 14px;
        color: var(--logo-dark);
        font-size: clamp(1.35rem, 2.4vw, 2rem);
        font-weight: 1000;
      }

      .edit-list {
        display: grid;
        gap: 9px;
        overflow: auto;
        padding-right: 5px;
      }

      .edit-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
      }

      .edit-row input {
        width: 100%;
        border: 3px solid rgba(0, 155, 211, .18);
        border-radius: 16px;
        padding: 10px 12px;
        color: var(--ink);
        background: #f7fdff;
        font: inherit;
        font-size: clamp(.98rem, 1.6vw, 1.2rem);
        font-weight: 800;
      }

      .delete-task {
        width: 44px;
        aspect-ratio: 1;
        border: 0;
        border-radius: 14px;
        color: var(--logo-dark);
        background: #eafaff;
        cursor: pointer;
        font: inherit;
        font-size: 1.45rem;
        font-weight: 1000;
      }

      .celebration {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 20;
      }

      .soap-bubble {
        position: fixed;
        bottom: -180px;
        width: var(--size);
        aspect-ratio: 1;
        border-radius: 50%;
        background:
          radial-gradient(circle at 32% 28%, rgba(255,255,255,.96) 0 12%, transparent 13%),
          radial-gradient(circle at 62% 72%, rgba(255,255,255,.35) 0 11%, transparent 12%),
          linear-gradient(135deg, rgba(255, 255, 255, .22), rgba(102, 199, 223, .22), rgba(140, 115, 216, .18));
        border: 2px solid rgba(255, 255, 255, .74);
        box-shadow:
          inset 0 0 18px rgba(255, 255, 255, .72),
          inset 8px 10px 18px rgba(102, 199, 223, .18),
          0 8px 18px rgba(45, 56, 90, .08);
        pointer-events: none;
        opacity: .82;
        animation: rise var(--duration) linear forwards;
      }

      .twinkle-star {
        position: fixed;
        left: var(--x);
        top: var(--y);
        width: var(--size);
        aspect-ratio: 1;
        pointer-events: none;
        z-index: 18;
        transform: translate(-50%, -50%) scale(.2) rotate(var(--turn));
        opacity: 0;
        filter:
          drop-shadow(0 0 3px rgba(255, 255, 255, .95))
          drop-shadow(0 4px 9px rgba(0, 126, 180, .24));
        animation: twinkle 1.95s ease-out forwards;
      }

      .twinkle-star::before,
      .twinkle-star::after {
        content: "";
        position: absolute;
        inset: 0;
        margin: auto;
        background: linear-gradient(135deg, #ffffff 0%, #7fe1ef 48%, #009bd3 100%);
        clip-path: polygon(50% 0%, 62% 35%, 100% 50%, 62% 65%, 50% 100%, 38% 65%, 0% 50%, 38% 35%);
      }

      .twinkle-star::after {
        transform: rotate(45deg) scale(.62);
        background: #ffffff;
      }

      @keyframes twinkle {
        0% {
          transform: translate(-50%, -50%) scale(.15) rotate(var(--turn));
          opacity: 0;
        }
        18% { opacity: 1; }
        46% {
          transform: translate(-50%, -50%) scale(1.18) rotate(calc(var(--turn) + 18deg));
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(.25) rotate(calc(var(--turn) + 42deg));
          opacity: 0;
        }
      }

      @keyframes rise {
        0% {
          transform: translate3d(0, 0, 0) scale(.55);
          opacity: .82;
        }
        70% { opacity: .82; }
        99% { opacity: .82; }
        to {
          transform: translate3d(var(--drift), -150vh, 0) scale(1.08);
          opacity: .82;
        }
      }

      @media (max-width: 900px) {
        .app { width: min(100vw - 20px, 760px); padding-top: 12px; }
        .topbar { grid-template-columns: auto 1fr auto; }
        .score { min-width: 0; }
        .board { grid-template-columns: repeat(2, minmax(0, 1fr)); grid-template-rows: repeat(8, minmax(0, 1fr)); }
      }
    </style>
  </head>
  <body>
    <div class="doodles" aria-hidden="true">
      <span class="doodle one">✓</span>
      <span class="doodle two">✦</span>
      <span class="doodle three">+</span>
    </div>
    <main class="app">
      <header class="topbar">
        <img class="school-logo" src="./school-logo.jpeg" alt="">
        <section class="score" aria-live="polite">
          <div class="score-top">
            <span id="scoreText">0 van 25 klaar</span>
          </div>
          <div class="meter" aria-hidden="true"><div class="meter-fill" id="meterFill"></div></div>
        </section>
        <div class="toolbar">
          <button class="tool-button edit" id="editTasks" type="button" aria-label="teksten aanpassen">✎</button>
          <button class="tool-button" id="addTask" type="button" aria-label="item toevoegen">+</button>
        </div>
      </header>

      <section class="board" id="board" aria-label="Schoonmaaklijst"></section>
    </main>

    <div class="celebration" id="celebration" aria-hidden="true"></div>

    <div class="add-panel" id="addPanel" aria-hidden="true">
      <form class="add-card" id="addForm">
        <label for="newTask">nieuw poetsklusje</label>
        <input id="newTask" name="newTask" type="text" autocomplete="off" maxlength="90" placeholder="bijvoorbeeld: bouwhoek">
        <div class="add-actions">
          <button class="cancel-add" id="cancelAdd" type="button">annuleren</button>
          <button class="save-add" type="submit">toevoegen</button>
        </div>
      </form>
    </div>

    <div class="add-panel edit-panel" id="editPanel" aria-hidden="true">
      <form class="add-card edit-card" id="editForm">
        <p class="edit-title">teksten aanpassen</p>
        <div class="edit-list" id="editList"></div>
        <div class="add-actions">
          <button class="cancel-add" id="cancelEdit" type="button">annuleren</button>
          <button class="save-add" type="submit">opslaan</button>
        </div>
      </form>
    </div>

    <script>
      const defaultTasks = [
        "ronde kussens bij ingang klas",
        "ladekast bij ingang klas",
        "digibord (niet het scherm zelf)",
        "kastenwand open vakken rechts van het digibord + lades",
        "bureau",
        "taalkast (bij uitgang klas)",
        "ipad + boekenbak",
        "bouwhoek",
        "winkelrek + blokken en de blokkenkast",
        "huishoek",
        "knutselkar",
        "knutseltafel met laadjes",
        "schilderkar",
        "poppenhuis",
        "ladekast naast aanrecht",
        "aanrecht",
        "kasten bij prikbordwand",
        "puzzelkast met puzzels",
        "tafels en stoelen (+onderkant)",
        "banken en lades eronder",
        "afvalbakken (fruit, papier, plastic en rest)",
        "grote kleed midden in de klas",
        "kleed in de bouwhoek",
        "vensterbanken en plinten",
        "kozijnen en deurposten"
      ];

      const builtInSongs = [
        "bedanklied01.mp3",
        "bedanklied02.mp3",
        "bedanklied03.mp3",
        "bedanklied04.mp3",
        "bedanklied05.mp3",
        "bedanklied06.mp3",
        "bedanklied07.mp3",
        "bedanklied08.mp3"
      ];

      const storageKey = "poetsfeest-digibord-state-rij-20260702-v3";
      const tasksKey = "poetsfeest-digibord-tasks-rij-20260702-v3";
      const tasksVersionKey = "poetsfeest-digibord-tasks-version-rij-20260702-v3";
      const defaultTasksVersion = "rijvolgorde-2026-07-02-v3";
      const board = document.querySelector("#board");
      const scoreText = document.querySelector("#scoreText");
      const meterFill = document.querySelector("#meterFill");
      const celebration = document.querySelector("#celebration");
      const addTaskButton = document.querySelector("#addTask");
      const editTasksButton = document.querySelector("#editTasks");
      const addPanel = document.querySelector("#addPanel");
      const addForm = document.querySelector("#addForm");
      const newTaskInput = document.querySelector("#newTask");
      const cancelAddButton = document.querySelector("#cancelAdd");
      const editPanel = document.querySelector("#editPanel");
      const editForm = document.querySelector("#editForm");
      const editList = document.querySelector("#editList");
      const cancelEditButton = document.querySelector("#cancelEdit");
      let audioContext;
      let activeSong = null;
      let tasks = loadTasks();
      let done = loadState();
      let twinkleTimer;

      function loadTasks() {
        try {
          const savedVersion = localStorage.getItem(tasksVersionKey);
          const saved = JSON.parse(localStorage.getItem(tasksKey) || "[]");
          const firstItemsMatch = Array.isArray(saved)
            && saved[0] === defaultTasks[0]
            && saved[1] === defaultTasks[1]
            && saved[2] === defaultTasks[2];

          if (savedVersion === defaultTasksVersion && firstItemsMatch && saved.length) {
            return saved;
          }

          localStorage.setItem(tasksKey, JSON.stringify(defaultTasks));
          localStorage.setItem(tasksVersionKey, defaultTasksVersion);
          return [...defaultTasks];
        } catch {
          localStorage.setItem(tasksKey, JSON.stringify(defaultTasks));
          localStorage.setItem(tasksVersionKey, defaultTasksVersion);
          return [...defaultTasks];
        }
      }

      function saveTasks() {
        localStorage.setItem(tasksKey, JSON.stringify(tasks));
        localStorage.setItem(tasksVersionKey, defaultTasksVersion);
      }

      function loadState() {
        try {
          const saved = JSON.parse(localStorage.getItem(storageKey) || "[]");
          if (!Array.isArray(saved)) return tasks.map(() => false);
          return tasks.map((_, index) => Boolean(saved[index]));
        } catch {
          return tasks.map(() => false);
        }
      }

      function saveState() {
        localStorage.setItem(storageKey, JSON.stringify(done));
      }

      function render() {
        board.innerHTML = "";
        board.classList.toggle("many", tasks.length > 15);
        const columns = 3;
        board.style.gridTemplateColumns = "repeat(" + columns + ", minmax(0, 1fr))";
        board.style.gridTemplateRows = "repeat(" + Math.ceil(tasks.length / columns) + ", minmax(0, 1fr))";
        tasks.forEach((name, index) => {
          const card = document.createElement("button");
          card.className = "task" + (done[index] ? " done" : "");
          card.type = "button";
          card.style.gridColumn = (index % columns) + 1;
          card.style.gridRow = Math.floor(index / columns) + 1;
          card.setAttribute("data-order", String(index + 1));
          card.setAttribute("aria-pressed", String(done[index]));
          card.innerHTML =
            '<span class="check" aria-hidden="true">✓</span>' +
            '<span class="task-name">' + name + '</span>';
          card.addEventListener("click", () => toggleTask(index));
          board.appendChild(card);
        });
        updateScore();
      }

      function toggleTask(index) {
        done[index] = !done[index];
        const isNowDone = done[index];
        saveState();
        render();
        if (isNowDone) {
          showHeartsOnTask(index);
          celebrate();
        }
      }

      function showHeartsOnTask(index) {
        const card = board.children[index];
        if (!card) return;

        for (let i = 0; i < 9; i += 1) {
          const heart = document.createElement("span");
          heart.className = "heart-pop";
          heart.textContent = "♥";
          heart.style.setProperty("--x", 24 + Math.random() * 58 + "%");
          heart.style.setProperty("--y", 56 + Math.random() * 28 + "%");
          heart.style.setProperty("--size", Math.round(14 + Math.random() * 20) + "px");
          heart.style.setProperty("--drift", Math.round(-26 + Math.random() * 52) + "px");
          heart.style.setProperty("--turn", Math.round(-18 + Math.random() * 36) + "deg");
          heart.style.animationDelay = Math.round(i * 65 + Math.random() * 80) + "ms";
          card.appendChild(heart);
          heart.addEventListener("animationend", () => heart.remove());
        }
      }

      function updateScore() {
        const count = done.filter(Boolean).length;
        const total = tasks.length;
        const percentage = Math.round((count / total) * 100);
        scoreText.textContent = count + " van " + total + " klaar";
        meterFill.style.width = percentage + "%";
      }

      function openAddPanel() {
        addPanel.classList.add("open");
        addPanel.setAttribute("aria-hidden", "false");
        newTaskInput.value = "";
        window.setTimeout(() => newTaskInput.focus(), 30);
      }

      function closeAddPanel() {
        addPanel.classList.remove("open");
        addPanel.setAttribute("aria-hidden", "true");
      }

      function openEditPanel() {
        editList.innerHTML = "";
        tasks.forEach((name, index) => {
          const row = document.createElement("div");
          row.className = "edit-row";
          row.innerHTML =
            '<input type="text" maxlength="90" value="' + escapeHtml(name) + '" aria-label="tekst aanpassen">' +
            '<button class="delete-task" type="button" aria-label="item verwijderen">×</button>';
          row.querySelector(".delete-task").addEventListener("click", () => {
            row.remove();
          });
          editList.appendChild(row);
        });
        editPanel.classList.add("open");
        editPanel.setAttribute("aria-hidden", "false");
        const firstInput = editList.querySelector("input");
        if (firstInput) window.setTimeout(() => firstInput.focus(), 30);
      }

      function closeEditPanel() {
        editPanel.classList.remove("open");
        editPanel.setAttribute("aria-hidden", "true");
      }

      function saveEditedTasks() {
        const nextTasks = [...editList.querySelectorAll("input")]
          .map((input) => input.value.trim().toLowerCase())
          .filter(Boolean);
        if (!nextTasks.length) return;
        const oldDone = done;
        tasks = nextTasks;
        done = tasks.map((_, index) => Boolean(oldDone[index]));
        saveTasks();
        saveState();
        closeEditPanel();
        render();
      }

      function addTask(name) {
        const cleanName = name.trim().toLowerCase();
        if (!cleanName) return;
        tasks.push(cleanName);
        done.push(false);
        saveTasks();
        saveState();
        closeAddPanel();
        render();
      }

      function ensureAudio() {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return null;
        if (!audioContext) audioContext = new AudioCtx();
        if (audioContext.state === "suspended") audioContext.resume();
        return audioContext;
      }

      function playOohSound() {
        const ctx = ensureAudio();
        if (!ctx) return;

        const now = ctx.currentTime;
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        const ooh = ctx.createOscillator();
        const shimmer = ctx.createOscillator();

        filter.type = "bandpass";
        filter.frequency.setValueAtTime(650, now);
        filter.frequency.exponentialRampToValueAtTime(520, now + .72);
        filter.Q.value = 7.5;

        ooh.type = "sine";
        ooh.frequency.setValueAtTime(230, now);
        ooh.frequency.exponentialRampToValueAtTime(175, now + .78);

        shimmer.type = "sine";
        shimmer.frequency.setValueAtTime(460, now);
        shimmer.frequency.exponentialRampToValueAtTime(350, now + .78);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.2, now + .06);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + .82);

        ooh.connect(filter);
        shimmer.connect(filter);
        filter.connect(gain).connect(ctx.destination);
        ooh.start(now);
        shimmer.start(now);
        ooh.stop(now + .86);
        shimmer.stop(now + .86);
      }

      function stopAllPageMusic() {
        if (activeSong) {
          activeSong.pause();
          activeSong.currentTime = 0;
          activeSong = null;
        }

        document.querySelectorAll("audio, video").forEach((media) => {
          media.pause();
          media.currentTime = 0;
        });
      }

      function playRandomSong() {
        stopAllPageMusic();

        const songUrl = builtInSongs[Math.floor(Math.random() * builtInSongs.length)];
        activeSong = new Audio(songUrl);
        activeSong.volume = 1;
        activeSong.preload = "auto";
        activeSong.play().catch(() => {
          playOohSound();
        });
      }

      function celebrate() {
        playRandomSong();
        blowSoapBubbles();
      }

      function blowSoapBubbles() {
        const bubbleCount = 74;
        const lanes = Array.from({ length: bubbleCount }, (_, index) => index);
        lanes.sort(() => Math.random() - 0.5);

        for (let i = 0; i < bubbleCount; i += 1) {
          const bubble = document.createElement("span");
          const lane = lanes[i];
          const size = Math.round(12 + Math.random() * 156);
          const left = ((lane + 0.18 + Math.random() * 0.64) / bubbleCount) * 100;
          bubble.className = "soap-bubble";
          bubble.style.left = left + "vw";
          bubble.style.setProperty("--size", size + "px");
          bubble.style.setProperty("--drift", Math.round(-230 + Math.random() * 460) + "px");
          bubble.style.setProperty("--duration", Math.round(4700 + Math.random() * 3300) + "ms");
          bubble.style.animationDelay = Math.round(Math.random() * 1350) + "ms";
          celebration.appendChild(bubble);
          bubble.addEventListener("animationend", () => bubble.remove());
        }
      }

      function twinkleRandomTask() {
        const cards = [...board.querySelectorAll(".task")];
        if (!cards.length) return;
        const card = cards[Math.floor(Math.random() * cards.length)];
        const rect = card.getBoundingClientRect();
        const starCount = 3 + Math.floor(Math.random() * 3);

        for (let i = 0; i < starCount; i += 1) {
          const star = document.createElement("span");
          star.className = "twinkle-star";
          star.style.setProperty("--x", rect.left + rect.width * (.16 + Math.random() * .72) + "px");
          star.style.setProperty("--y", rect.top + rect.height * (.12 + Math.random() * .76) + "px");
          star.style.setProperty("--size", Math.round(14 + Math.random() * 22) + "px");
          star.style.setProperty("--turn", Math.round(Math.random() * 90) + "deg");
          star.style.animationDelay = Math.round(i * 120 + Math.random() * 120) + "ms";
          document.body.appendChild(star);
          star.addEventListener("animationend", () => star.remove());
        }
      }

      function scheduleTwinkle() {
        window.clearTimeout(twinkleTimer);
        const delay = 6500 + Math.random() * 6500;
        twinkleTimer = window.setTimeout(() => {
          twinkleRandomTask();
          scheduleTwinkle();
        }, delay);
      }

      addTaskButton.addEventListener("click", openAddPanel);
      editTasksButton.addEventListener("click", openEditPanel);
      cancelAddButton.addEventListener("click", closeAddPanel);
      cancelEditButton.addEventListener("click", closeEditPanel);
      addPanel.addEventListener("click", (event) => {
        if (event.target === addPanel) closeAddPanel();
      });
      editPanel.addEventListener("click", (event) => {
        if (event.target === editPanel) closeEditPanel();
      });
      addForm.addEventListener("submit", (event) => {
        event.preventDefault();
        addTask(newTaskInput.value);
      });
      editForm.addEventListener("submit", (event) => {
        event.preventDefault();
        saveEditedTasks();
      });

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll('"', "&quot;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      render();
      window.setTimeout(twinkleRandomTask, 1000);
      scheduleTwinkle();
    </script>
  </body>
</html>
